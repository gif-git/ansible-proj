---
- name: Install Apache and PHP
  hosts: webservers
  become: yes

  tasks:

    - name: Update apt cache on Debian systems
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == "Debian"

    #################################################################
    # Apache Installation
    #################################################################

    - name: Install Apache on Debian
      apt:
        name: apache2
        state: present
      when: ansible_facts['os_family'] == "Debian"

    - name: Install Apache on RedHat
      yum:
        name: httpd
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    #################################################################
    # PHP Installation
    #################################################################

    - name: Install PHP packages on Debian
      apt:
        name:
          - php
          - php-cli
          - php-common
          - php-mysql
          - php-gd
          - php-xml
          - php-mbstring
          - php-curl
          - php-zip
          - php-opcache
        state: present
      when: ansible_facts['os_family'] == "Debian"

    - name: Install PHP packages on RedHat
      yum:
        name:
          - php
          - php-cli
          - php-common
          - php-mysqlnd
          - php-gd
          - php-xml
          - php-mbstring
          - php-curl
          - php-zip
          - php-opcache
        state: present
      when: ansible_facts['os_family'] == "RedHat"

    #################################################################
    # Service Management
    #################################################################

    - name: Start Apache on Debian
      service:
        name: apache2
        state: started
        enabled: yes
      when: ansible_facts['os_family'] == "Debian"

    - name: Start Apache on RedHat
      service:
        name: httpd
        state: started
        enabled: yes
      when: ansible_facts['os_family'] == "RedHat"

    #################################################################
    # Firewall Configuration
    #################################################################

    - name: Allow HTTP in firewalld
      firewalld:
        service: http
        permanent: yes
        state: enabled
        immediate: yes
      when: ansible_facts['os_family'] == "RedHat"
      ignore_errors: yes

    - name: Allow HTTPS in firewalld
      firewalld:
        service: https
        permanent: yes
        state: enabled
        immediate: yes
      when: ansible_facts['os_family'] == "RedHat"
      ignore_errors: yes

    - name: Allow HTTP in UFW
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp
      when: ansible_facts['os_family'] == "Debian"
      ignore_errors: yes

    - name: Allow HTTPS in UFW
      community.general.ufw:
        rule: allow
        port: "443"
        proto: tcp
      when: ansible_facts['os_family'] == "Debian"
      ignore_errors: yes

    #################################################################
    # PHP Test Page
    #################################################################

    - name: Create PHP info page on Debian
      copy:
        dest: /var/www/html/info.php
        content: |
          <?php
          phpinfo();
          ?>
      when: ansible_facts['os_family'] == "Debian"

    - name: Create PHP info page on RedHat
      copy:
        dest: /var/www/html/info.php
        content: |
          <?php
          phpinfo();
          ?>
      when: ansible_facts['os_family'] == "RedHat"
