---
- name: Configure Swap Space
  hosts: all
  become: yes

  vars:
    swap_file_path: /root/swapfile
    swap_file_size: 4G

  tasks:

    - name: Check if swap file exists
      stat:
        path: "{{ swap_file_path }}"
      register: swap_file_check

    - name: Create swap file
      command: fallocate -l {{ swap_file_size }} {{ swap_file_path }}
      when: not swap_file_check.stat.exists

    - name: Set correct permissions on swap file
      file:
        path: "{{ swap_file_path }}"
        owner: root
        group: root
        mode: '0600'

    - name: Format swap file
      command: mkswap {{ swap_file_path }}
      when: not swap_file_check.stat.exists

    - name: Enable swap
      command: swapon {{ swap_file_path }}
      when: ansible_swaptotal_mb == 0

    - name: Persist swap in /etc/fstab
      mount:
        name: none
        src: "{{ swap_file_path }}"
        fstype: swap
        opts: sw
        passno: 0
        dump: 0
        state: present

    - name: Display swap information
      command: swapon --show
      register: swap_output

    - name: Show swap details
      debug:
        var: swap_output.stdout_lines
