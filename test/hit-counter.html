<html>
    <head>
        <title>Hit Counter!!!</title>
        <script language="vbscript">
            dim c
            c=0
            sub count()
            c=c+1
            msgbox("Counter:"&c)
            end sub
        </script>
    </head>
    <body>
        <input type="button" name="b1" value="Hit me!" onclick="count()">
    </body>
</html>
